<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GPA Assistant | Government Polytechnic Aurangabad</title>
  <!-- Google Fonts: Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-main: #0b0f19;
      --bg-chat: #111827;
      --bg-bubble-user: #6366f1;
      --bg-bubble-ai: #1f2937;
      --text-main: #f3f4f6;
      --text-muted: #9ca3af;
      --accent: #6366f1;
      --accent-hover: #4f46e5;
      --border-color: #374151;
      --error-color: #ef4444;
      --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: var(--font-sans);
      background-color: var(--bg-main);
      color: var(--text-main);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Header */
    header {
      background-color: var(--bg-chat);
      border-bottom: 1px solid var(--border-color);
      padding: 1rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
      z-index: 10;
    }

    .header-title {
      display: flex;
      flex-direction: column;
    }

    .header-title h1 {
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--text-main);
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .header-title span {
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-top: 0.1rem;
    }

    .badge {
      background-color: rgba(99, 102, 241, 0.15);
      color: var(--accent);
      border: 1px solid rgba(99, 102, 241, 0.3);
      padding: 0.25rem 0.75rem;
      border-radius: 9999px;
      font-size: 0.75rem;
      font-weight: 600;
    }

    /* Main Chat Container */
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      max-width: 850px;
      width: 100%;
      margin: 0 auto;
      position: relative;
      overflow: hidden;
    }

    /* Messages Area */
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 2rem 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
      scroll-behavior: smooth;
    }

    /* Scrollbar Styling */
    .chat-messages::-webkit-scrollbar {
      width: 6px;
    }
    .chat-messages::-webkit-scrollbar-track {
      background: transparent;
    }
    .chat-messages::-webkit-scrollbar-thumb {
      background: var(--border-color);
      border-radius: 999px;
    }

    /* Welcome / Hero State */
    .welcome-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      margin: auto 0;
      padding: 2rem 1rem;
    }

    .welcome-logo {
      font-size: 3.5rem;
      margin-bottom: 1rem;
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    .welcome-heading {
      font-size: 1.75rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
      background: linear-gradient(135deg, #a5b4fc, var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .welcome-sub {
      color: var(--text-muted);
      max-width: 480px;
      font-size: 0.95rem;
      line-height: 1.5;
      margin-bottom: 2rem;
    }

    /* Suggestion Chips */
    .suggestions {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 0.75rem;
      max-width: 650px;
      width: 100%;
    }

    .chip {
      background-color: var(--bg-chat);
      border: 1px solid var(--border-color);
      padding: 1rem;
      border-radius: 12px;
      text-align: left;
      color: var(--text-main);
      cursor: pointer;
      font-size: 0.875rem;
      font-weight: 500;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.5rem;
    }

    .chip:hover {
      border-color: var(--accent);
      background-color: rgba(99, 102, 241, 0.05);
      transform: translateY(-2px);
    }

    .chip-arrow {
      color: var(--accent);
      opacity: 0;
      transition: opacity 0.2s ease;
    }

    .chip:hover .chip-arrow {
      opacity: 1;
    }

    /* Chat Bubbles */
    .message-row {
      display: flex;
      width: 100%;
      margin-bottom: 0.5rem;
    }

    .message-row.user {
      justify-content: flex-end;
    }

    .message-row.ai {
      justify-content: flex-start;
    }

    .bubble {
      max-width: 80%;
      padding: 0.9rem 1.25rem;
      border-radius: 16px;
      font-size: 0.95rem;
      line-height: 1.5;
      position: relative;
      word-wrap: break-word;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
    }

    .bubble.user {
      background-color: var(--bg-bubble-user);
      color: #ffffff;
      border-bottom-right-radius: 4px;
    }

    .bubble.ai {
      background-color: var(--bg-bubble-ai);
      color: var(--text-main);
      border-bottom-left-radius: 4px;
      border: 1px solid var(--border-color);
    }

    .bubble-source {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-top: 0.6rem;
      padding-top: 0.5rem;
      border-top: 1px dashed var(--border-color);
      display: flex;
      align-items: center;
      gap: 0.35rem;
    }

    /* Input Area */
    .input-container {
      padding: 1rem 1.5rem;
      background-color: var(--bg-main);
    }

    .input-box {
      background-color: var(--bg-chat);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      padding: 0.5rem 0.5rem 0.5rem 1.25rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    .input-box:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.2);
    }

    .input-box input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text-main);
      font-size: 0.95rem;
      font-family: var(--font-sans);
      padding: 0.75rem 0;
    }

    .input-box input::placeholder {
      color: var(--text-muted);
    }

    .send-btn {
      background-color: var(--accent);
      border: none;
      outline: none;
      width: 40px;
      height: 40px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: #ffffff;
      transition: background-color 0.2s ease, transform 0.1s ease;
    }

    .send-btn:hover {
      background-color: var(--accent-hover);
    }

    .send-btn:active {
      transform: scale(0.95);
    }

    .send-btn svg {
      width: 18px;
      height: 18px;
      fill: currentColor;
    }

    /* Footer */
    footer {
      text-align: center;
      padding: 0.75rem;
      font-size: 0.75rem;
      color: var(--text-muted);
      border-top: 1px solid rgba(255, 255, 255, 0.02);
      background-color: var(--bg-main);
    }

    /* Typing Loader */
    .typing-dots {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 4px 8px;
    }

    .typing-dots span {
      width: 8px;
      height: 8px;
      background-color: var(--text-muted);
      border-radius: 50%;
      display: inline-block;
      animation: bounce 1.4s infinite ease-in-out both;
    }

    .typing-dots span:nth-child(1) { animation-delay: -0.32s; }
    .typing-dots span:nth-child(2) { animation-delay: -0.16s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0); }
      40% { transform: scale(1.0); }
    }

    /* Responsive */
    @media (max-width: 640px) {
      .suggestions {
        grid-template-columns: 1fr;
        gap: 0.5rem;
      }
      .welcome-heading {
        font-size: 1.4rem;
      }
      .welcome-logo {
        font-size: 2.8rem;
      }
      header {
        padding: 0.75rem 1rem;
      }
      header h1 {
        font-size: 1.1rem;
      }
      .bubble {
        max-width: 90%;
      }
    }
  </style>
</head>
<body>

  <!-- Header -->
  <header>
    <div class="header-title">
      <h1>GPA Assistant 🎓</h1>
      <span>Government Polytechnic Aurangabad</span>
    </div>
    <div style="display: flex; align-items: center; gap: 0.75rem;">
      <span class="badge">Official AI Assistant</span>
      <a href="/static/login.html" class="badge" style="text-decoration: none; background-color: rgba(255, 255, 255, 0.08); color: var(--text-muted); border: 1px solid var(--border-color); cursor: pointer; transition: all 0.2s;" onmouseover="this.style.backgroundColor='rgba(255, 255, 255, 0.15)'; this.style.color='#ffffff'" onmouseout="this.style.backgroundColor='rgba(255, 255, 255, 0.08)'; this.style.color='var(--text-muted)'">Staff Login 🔑</a>
    </div>
  </header>

  <!-- Main Area -->
  <main>
    <div id="chat-messages" class="chat-messages">
      <!-- Welcome Hero -->
      <div id="welcome-state" class="welcome-container">
        <div class="welcome-logo">🎓</div>
        <h2 class="welcome-heading">Welcome to GPA AI Assistant</h2>
        <p class="welcome-sub">Ask any question about admissions, fee structures, syllabus, faculty list, hostel details, and college guidelines.</p>
        
        <!-- Suggestions Chips -->
        <div class="suggestions">
          <button class="chip" onclick="askPreset('What are the admission requirements?')">
            <span>What are the admission requirements?</span>
            <span class="chip-arrow">➔</span>
          </button>
          <button class="chip" onclick="askPreset('What is the fee structure?')">
            <span>What is the fee structure?</span>
            <span class="chip-arrow">➔</span>
          </button>
          <button class="chip" onclick="askPreset('Who is the principal?')">
            <span>Who is the principal?</span>
            <span class="chip-arrow">➔</span>
          </button>
          <button class="chip" onclick="askPreset('What courses are offered?')">
            <span>What courses are offered?</span>
            <span class="chip-arrow">➔</span>
          </button>
        </div>
      </div>
    </div>

    <!-- Input Box -->
    <div class="input-container">
      <div class="input-box">
        <input type="text" id="query-input" placeholder="Type your question here..." onkeypress="handleKeyPress(event)" autocomplete="off">
        <button class="send-btn" id="send-button" onclick="submitQuery()">
          <svg viewBox="0 0 24 24">
            <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path>
          </svg>
        </button>
      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer>
    Powered by CampConnect AI • Government Polytechnic Aurangabad
  </footer>

  <script>
    let collegeClientId = "";

    // Load College Client ID from Backend Config on Load
    async function loadConfig() {
      try {
        const response = await fetch('/api/config/college');
        if (response.ok) {
          const data = await response.json();
          collegeClientId = data.college_client_id;
          console.log("Loaded college client ID:", collegeClientId);
        }
      } catch (error) {
        console.error("Error loading config:", error);
      }
    }

    window.addEventListener('DOMContentLoaded', loadConfig);

    // Auto-scroll messages
    function scrollToBottom() {
      const chatMessages = document.getElementById('chat-messages');
      chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    // Handle pressing Enter
    function handleKeyPress(event) {
      if (event.key === 'Enter') {
        submitQuery();
      }
    }

    // Submit suggested question
    function askPreset(question) {
      document.getElementById('query-input').value = question;
      submitQuery();
    }

    // Submit Query to Public API
    async function submitQuery() {
      const inputEl = document.getElementById('query-input');
      const question = inputEl.value.trim();
      if (!question) return;

      // Clear input
      inputEl.value = '';

      // Remove welcome hero if visible
      const welcomeState = document.getElementById('welcome-state');
      if (welcomeState) {
        welcomeState.remove();
      }

      // Append user bubble
      appendMessageBubble('user', question);
      scrollToBottom();

      // Append typing loader
      const loaderBubble = appendLoaderBubble();
      scrollToBottom();

      if (!collegeClientId) {
        // Fallback to hardcoded UUID if endpoint configuration wasn't returned yet
        collegeClientId = "4a78c1ab-98db-4e12-b5fb-df98a9643d92";
      }

      try {
        const response = await fetch(`/api/query/public/${collegeClientId}`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ question: question })
        });

        loaderBubble.remove();

        if (response.status === 429) {
          appendMessageBubble('ai', '⚠️ Rate limit exceeded. You can only make 20 queries per hour. Please try again later.');
          scrollToBottom();
          return;
        }

        if (!response.ok) {
          const errData = await response.json().catch(() => ({}));
          throw new Error(errData.detail || 'Failed to retrieve response.');
        }

        const data = await response.json();
        
        // Formulate sources string if present
        let sourcesStr = "";
        if (data.sources && data.sources.length > 0) {
          const uniqueSources = [...new Set(data.sources.map(s => s.source))];
          sourcesStr = "Source: " + uniqueSources.join(', ');
        }

        appendMessageBubble('ai', data.answer, sourcesStr);
        scrollToBottom();

      } catch (error) {
        if (loaderBubble) loaderBubble.remove();
        console.error("Query Error:", error);
        appendMessageBubble('ai', `⚠️ Error: ${error.message || 'Something went wrong. Please make sure PDFs are uploaded.'}`);
        scrollToBottom();
      }
    }

    // Helper: append message bubble
    function appendMessageBubble(sender, text, source = "") {
      const container = document.getElementById('chat-messages');
      const row = document.createElement('div');
      row.className = `message-row ${sender}`;

      const bubble = document.createElement('div');
      bubble.className = `bubble ${sender}`;
      
      const textNode = document.createElement('div');
      textNode.textContent = text;
      bubble.appendChild(textNode);

      if (source) {
        const sourceNode = document.createElement('div');
        sourceNode.className = 'bubble-source';
        sourceNode.innerHTML = `📚 <span>${escapeHTML(source)}</span>`;
        bubble.appendChild(sourceNode);
      }

      row.appendChild(bubble);
      container.appendChild(row);
      return row;
    }

    // Helper: append typing loader
    function appendLoaderBubble() {
      const container = document.getElementById('chat-messages');
      const row = document.createElement('div');
      row.className = 'message-row ai';

      const bubble = document.createElement('div');
      bubble.className = 'bubble ai';

      const loader = document.createElement('div');
      loader.className = 'typing-dots';
      loader.innerHTML = '<span></span><span></span><span></span>';
      bubble.appendChild(loader);

      row.appendChild(bubble);
      container.appendChild(row);
      return row;
    }

    // Helper: Escape HTML string
    function escapeHTML(str) {
      if (!str) return '';
      return str.replace(/[&<>'"]/g, 
        tag => ({
          '&': '&amp;',
          '<': '&lt;',
          '>': '&gt;',
          "'": '&#39;',
          '"': '&quot;'
        }[tag] || tag)
      );
    }
  </script>
</body>
</html>
